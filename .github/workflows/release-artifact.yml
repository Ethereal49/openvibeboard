name: Release Artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Sign and notarize
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openvibeboard.keychain-db"
          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarytool
        env:
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER_ID: ${{ secrets.NOTARYTOOL_ISSUER_ID }}
          NOTARYTOOL_PRIVATE_KEY_BASE64: ${{ secrets.NOTARYTOOL_PRIVATE_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARYTOOL_KEY_ID}.p8"
          printf '%s' "$NOTARYTOOL_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials openvibeboard-notary \
            --key "$KEY_PATH" \
            --key-id "$NOTARYTOOL_KEY_ID" \
            --issuer "$NOTARYTOOL_ISSUER_ID"

      - name: Build signed and notarized artifact
        env:
          SIGNING_MODE: developer-id
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARYTOOL_PROFILE: openvibeboard-notary
        run: scripts/package-release.sh

      - name: Upload validated artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenVibeBoard-signed-notarized
          path: |
            dist/OpenVibeBoard-*-macos-signed-notarized.zip
            dist/OpenVibeBoard-*-macos-signed-notarized.zip.sha256
          if-no-files-found: error

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/openvibeboard.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8
