name: OpenVibeBoard
options:
  bundleIdPrefix: com.ethereal49
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: zh-Hans
packages:                                    # 阶段 B：ORSSerialPort SPM 远程依赖
  ORSSerialPort:
    url: https://github.com/armadsen/ORSSerialPort.git
    from: "2.1.0"                            # 最新稳定 tag = 2.1.0（2019-06-13）；不要写更高版本，不存在
settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"   # 先用 Swift 5 mode，避免 ORSSerialPort 无 Sendable 标注的 Swift 6 strict concurrency 警告
targets:
  OpenVibeBoard:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenVibeBoard
    dependencies:                            # 阶段 B：target 依赖 ORSSerialPort
      - package: ORSSerialPort
        product: ORSSerial                   # ★ product 名是 ORSSerial，不是 ORSSerialPort（极易写错）
    info:
      path: OpenVibeBoard/Info.plist
      properties:
        CFBundleDisplayName: OpenVibeBoard
        CFBundleShortVersionString: $(MARKETING_VERSION)   # 引用 build setting，由 MARKETING_VERSION 注入（project.yml 顶部 settings.base）
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)        # 引用 build setting，由 CURRENT_PROJECT_VERSION 注入
        LSUIElement: true            # ★ menu bar app 必需：accessory 模式，不在 Dock 显示、无主窗口
        LSMinimumSystemVersion: "14.0"
        NSAppleEventsUsageDescription: "OpenVibeBoard 需要发送 Apple 事件以执行 cmd 动作与按键模拟。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethereal49.OpenVibeBoard
        # 阶段 B：串口 entitlement（com.apple.security.device.serial）要生效，
        # 必须打开签名（ad-hoc "-" 即可，无需付费开发者账号），并显式声明 entitlements 文件。
        # 阶段 A 关签名（CODE_SIGNING_REQUIRED=NO 等）仅为简化；阶段 B 引入 sandboxed 串口访问后必须翻转为 YES。
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_ENTITLEMENTS: OpenVibeBoard/OpenVibeBoard.entitlements
  # 阶段 F：Swift Testing 测试 target。
  # type: bundle.unit-test 是 xcodegen 对 macOS unit test bundle 的标准映射，
  # Xcode 16+ 在此 target 内 `import Testing` 即可用 Swift Testing，无需额外依赖。
  # 测纯逻辑（parseKey/Codable/parseLine/decideAction），不触 CGEvent/Process/串口/SMAppService 副作用
  # （这些由 C/B/E 实测门覆盖，见 research/swift-testing.md）。
  OpenVibeBoardTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenVibeBoardTests
    dependencies:
      - target: OpenVibeBoard
    settings:
      base:
        # unit-test bundle 需 Info.plist 才能 code sign（ad-hoc）+ 加载到 host。
        # 让 Xcode 自动生成（Xcode 13+ 推荐），不手写 Info.plist。
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ethereal49.OpenVibeBoardTests
